name: Repo Health

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Repo structure and cleanup checks
        run: bash scripts/ci/check_repo_health.sh

      - name: PHP include smoke check
        run: php scripts/ci/check_includes.php

      - name: API contract smoke check
        run: php scripts/ci/check_api_contract.php
