name: PHP Lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        shell: bash
        run: |
          set -e
          mapfile -t files < <(find . -type f -name '*.php' -not -path './vendor/*' -not -path './node_modules/*')
          if [ ${#files[@]} -eq 0 ]; then
            echo 'No PHP files found.'
            exit 0
          fi
          for file in "${files[@]}"; do
            php -l "$file"
          done
